apiVersion: influxdata.com/v2alpha1
kind: Dashboard
metadata:
  name: app-distribution-board
spec:
  name: App Traffic Monitoring
  description: Automatically provisioned distribution analytics
  charts:
    - name: Traffic Volume by Pod ID
      height: 4
      width: 12
      xPosition: 0
      yPosition: 0
      kind: gauge
      properties:
        queries:
          - text: |
              from(bucket: "request_stats")
                |> range(start: v.timeRangeStart, stop: v.timeRangeStop)
                |> filter(fn: (r) => r._measurement == "request" and r._field == "status_code")
                |> group(columns: ["pod_id"])
                |> aggregateWindow(every: v.windowPeriod, fn: count, createEmpty: false)
                |> yield(name: "count")
        shape: Chronological Timeline
        type: line
        colors:
          - hex: "#00C9FF"
            name: Neon Blue
            type: scale